name: Update offline ZIP

on:
  push:
    branches: [main]
    paths:
      - index.html
      - register.py
      - register_manual.md

jobs:
  update-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version date in index.html
        run: |
          VERSION=$(date -u '+%Y.%m.%d')
          sed -i "s|<span class=\"header-version\">[^<]*</span>|<span class=\"header-version\">${VERSION}</span>|" index.html

      - name: Rebuild ZIP
        run: zip -j register_offline.zip index.html register.py register_manual.md

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html register_offline.zip
          git diff --cached --quiet || git commit -m "chore: update version to $(date -u '+%Y.%m.%d') and rebuild ZIP"
          git push
