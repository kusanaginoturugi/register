name: Update offline ZIP

on:
  push:
    branches: [main]
    paths:
      - index.html
      - register.py
      - register_manual.md

jobs:
  update-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild ZIP
        run: zip -j register_offline.zip index.html register.py register_manual.md

      - name: Commit updated ZIP
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add register_offline.zip
          git diff --cached --quiet || git commit -m "chore: update register_offline.zip"
          git push
